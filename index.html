<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gia Đình Tony</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
color:#333;
text-align:center;
}

/* HERO */

.hero{
background:url("images/hero.jpg") center 30%/cover no-repeat;
height:65vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

.hero h1{

font-size:42px;
margin:0;

}

.hero p{

margin-top:10px;
font-size:18px;

}

/* GALLERY */

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

gap:24px;

max-width:1100px;

margin:60px auto;

padding:0 20px;

}
.gallery img{

width:100%;
height:320px;

object-fit:cover;
object-position:center;

border-radius:16px;

cursor:pointer;

transition:0.35s;

}

.gallery img:hover{

transform:scale(1.06);

box-shadow:0 15px 35px rgba(0,0,0,0.25);

}
/* LIGHTBOX */

.lightbox{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.lightbox img{

max-width:90%;
max-height:90%;

border-radius:10px;

}

/* FACEBOOK */

.facebook{

max-width:500px;

margin:60px auto;

padding:0 10px;

}

.facebook iframe{

width:100%;

}

/* SOCIAL */

.social{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

max-width:380px;

margin:40px auto 80px;

}

.social a{

background:black;

color:white;

padding:18px;

text-decoration:none;

border-radius:12px;

font-size:18px;

transition:0.25s;

display:flex;

align-items:center;
justify-content:center;

}

.social a:hover{

background:#444;

transform:translateY(-3px);

}

/* MOBILE */

@media(max-width:600px){

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

.gallery{
gap:14px;
}

}

</style>

</head>

<body>


<div class="hero">

<h1>Gia Đình Tony</h1>

<p>Lưu giữ những chuyến đi trước khi chúng trở thành ký ức</p>

</div>


<div class="gallery">

<img src="images/Trek1.jpg" onclick="openImg(this)">
<img src="images/Trek2.jpg" onclick="openImg(this)">
<img src="images/Trek3.jpg" onclick="openImg(this)">
<img src="images/Trek4.jpg" onclick="openImg(this)">
<img src="images/Trek5.jpg" onclick="openImg(this)">
<img src="images/Trek6.jpg" onclick="openImg(this)">
<img src="images/Trek7.jpg" onclick="openImg(this)">
<img src="images/Trek8.jpg" onclick="openImg(this)">

</div>


<div class="facebook">

<iframe

src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/giadinhtonyvo&tabs=timeline&width=500&height=600&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"

height="600"

style="border:none;overflow:hidden"

scrolling="no"

frameborder="0"

allowfullscreen="true">

</iframe>

</div>


<div class="social">

<a href="https://facebook.com/giadinhTony">📘 Facebook</a>

<a href="#">▶️ YouTube</a>

<a href="#">🎵 TikTok</a>

<a href="#">📷 Instagram</a>

</div>


<div class="lightbox" id="lightbox" onclick="closeImg()">

<img id="lightbox-img">

</div>


<script>

function openImg(img){

document.getElementById("lightbox").style.display="flex";

document.getElementById("lightbox-img").src=img.src;

}

function closeImg(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
