<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gia Đình Tony</title>

<meta name="description" content="Gia Đình Tony - lưu giữ những chuyến đi và ký ức gia đình">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
color:#333;
text-align:center;
}

/* HERO */

.hero{
background:url("images/hero.jpg") center 30%/cover no-repeat;
min-height:65vh;
padding:80px 20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-shadow:0 3px 15px rgba(0,0,0,0.7);
}

.hero h1{
font-size:42px;
margin:0;
}

.hero p{
margin-top:12px;
font-size:18px;
max-width:620px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1100px;
margin:60px auto;
padding:0 20px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:16px;
cursor:pointer;
transition:0.35s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:92%;
max-height:92%;
border-radius:10px;
}

.nav{
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
padding:20px;
user-select:none;
}

.prev{
left:10px;
}

.next{
right:10px;
}

/* FACEBOOK */

.facebook{
max-width:500px;
margin:60px auto;
padding:0 10px;
}

.facebook iframe{
width:100%;
border:none;
}

/* SOCIAL */

.social{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
max-width:420px;
margin:40px auto 80px;
padding:0 20px;
}

.social a{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:16px;
border-radius:12px;
color:white;
text-decoration:none;
font-size:17px;
transition:0.25s;
}

.social a:hover{
transform:translateY(-3px);
}

/* BRAND COLORS */

.fb{background:#1877F2;}
.yt{background:#FF0000;}
.tt{background:#000;}
.ig{
background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.social svg{
width:20px;
height:20px;
fill:white;
}

/* MOBILE */

@media(max-width:600px){

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

.gallery img{
height:230px;
}

}

</style>

</head>

<body>

<div class="hero">

<h1>Gia Đình Tony</h1>
<p>Lưu giữ những chuyến đi trước khi chúng trở thành ký ức</p>

</div>


<div class="gallery">

<img src="images/Trek1.jpg" loading="lazy" onclick="openImg(0)">
<img src="images/Trek2.jpg" loading="lazy" onclick="openImg(1)">
<img src="images/Trek3.jpg" loading="lazy" onclick="openImg(2)">
<img src="images/Trek4.jpg" loading="lazy" onclick="openImg(3)">
<img src="images/Trek5.jpg" loading="lazy" onclick="openImg(4)">
<img src="images/Trek6.jpg" loading="lazy" onclick="openImg(5)">
<img src="images/Trek7.jpg" loading="lazy" onclick="openImg(6)">
<img src="images/Trek8.jpg" loading="lazy" onclick="openImg(7)">

</div>


<div class="facebook">

<iframe
src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/giadinhtonyvo&tabs=timeline&height=600&adapt_container_width=true"
height="600"
scrolling="no"
frameborder="0"
allowfullscreen="true">
</iframe>

</div>


<div class="social">

<a class="fb" href="https://facebook.com/giadinhtonyvo" target="_blank">

<svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 10-11.6 9.9v-7H7v-3h3.4V9.4c0-3.4 2-5.3 5.1-5.3 1.5 0 3 .3 3 .3v3.3h-1.7c-1.7 0-2.2 1-2.2 2.1V12H18l-.5 3h-2.9v7A10 10 0 0022 12z"/></svg>

Facebook

</a>

<a class="yt" href="https://youtube.com/@giadinhtonyvo" target="_blank">

<svg viewBox="0 0 24 24"><path d="M23.5 6.2s-.2-1.7-.7-2.5c-.6-.9-1.3-.9-1.6-1C18.9 2.4 12 2.4 12 2.4h0s-6.9 0-9.2.3c-.3.1-1 .1-1.6 1C.7 4.5.5 6.2.5 6.2S.3 8.2.3 10.2v1.6c0 2 .2 4 .2 4s.2 1.7.7 2.5c.6.9 1.4.9 1.8 1 1.3.1 5.5.3 9 .3s7.7-.2 9-.3c.4-.1 1.2-.1 1.8-1 .5-.8.7-2.5.7-2.5s.2-2 .2-4v-1.6c0-2-.2-4-.2-4zM9.8 14.6V7.8l6 3.4-6 3.4z"/></svg>

YouTube

</a>

<a class="tt" href="https://tiktok.com/@giadinhtonyofficial" target="_blank">

TikTok

</a>

<a class="ig" href="https://instagram.com/giadinhtonyvo" target="_blank">

Instagram

</a>

</div>


<div class="lightbox" id="lightbox">

<span class="nav prev" onclick="prev()">❮</span>
<img id="lightbox-img">
<span class="nav next" onclick="next()">❯</span>

</div>


<script>

let imgs=document.querySelectorAll(".gallery img")
let index=0

function openImg(i){

index=i
document.getElementById("lightbox").style.display="flex"
document.getElementById("lightbox-img").src=imgs[index].src

}

function closeImg(){

document.getElementById("lightbox").style.display="none"

}

document.getElementById("lightbox").onclick=closeImg

function next(){

index++
if(index>=imgs.length){index=0}

document.getElementById("lightbox-img").src=imgs[index].src

}

function prev(){

index--
if(index<0){index=imgs.length-1}

document.getElementById("lightbox-img").src=imgs[index].src

}

</script>

</body>
</html>
