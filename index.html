<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gia Đình Tony</title>

<meta name="description" content="Gia Đình Tony - lưu giữ những chuyến đi, hành trình trekking và ký ức gia đình.">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
color:#333;
text-align:center;
}

/* HERO */

.hero{
background:url("images/hero.jpg") center 30%/cover no-repeat;
min-height:65vh;
padding:80px 20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

.hero h1{
font-size:42px;
margin:0;
}

.hero p{
margin-top:10px;
font-size:18px;
max-width:600px;
}

/* GALLERY */

.gallery{

column-count:3;
column-gap:18px;

max-width:1100px;
margin:60px auto;
padding:0 20px;

}

.gallery img{

width:100%;
margin-bottom:18px;
border-radius:16px;
cursor:pointer;
transition:0.35s;

}

.gallery img:hover{

transform:scale(1.04);
box-shadow:0 15px 35px rgba(0,0,0,0.25);

}

/* LIGHTBOX */

.lightbox{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.92);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.lightbox img{

max-width:90%;
max-height:90%;
border-radius:10px;

}

/* FACEBOOK */

.facebook{

max-width:500px;
margin:60px auto;
padding:0 10px;

}

.facebook iframe{
width:100%;
}

/* SOCIAL */

.social{

display:grid;
grid-template-columns:1fr 1fr;
gap:18px;

max-width:420px;
margin:40px auto 80px;

}

.social a{

color:white;
padding:18px;
text-decoration:none;
border-radius:12px;
font-size:18px;

display:flex;
align-items:center;
justify-content:center;
gap:10px;

transition:0.25s;

}

.social a:hover{
transform:translateY(-3px);
}

/* BRAND COLORS */

.facebook-btn{
background:#1877F2;
}

.youtube-btn{
background:#FF0000;
}

.tiktok-btn{
background:#000;
}

.instagram-btn{

background:linear-gradient(
45deg,
#f58529,
#dd2a7b,
#8134af,
#515bd4
);

}

/* MOBILE */

@media(max-width:900px){
.gallery{
column-count:2;
}
}

@media(max-width:600px){

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

.gallery{
column-count:1;
}

}

</style>

</head>

<body>


<div class="hero">

<h1>Gia Đình Tony</h1>

<p>Lưu giữ những chuyến đi trước khi chúng trở thành ký ức</p>

</div>


<div class="gallery">

<img src="images/Trek1.jpg" loading="lazy" alt="Gia dinh Tony trek 1" onclick="openImg(0)">
<img src="images/Trek2.jpg" loading="lazy" alt="Gia dinh Tony trek 2" onclick="openImg(1)">
<img src="images/Trek3.jpg" loading="lazy" alt="Gia dinh Tony trek 3" onclick="openImg(2)">
<img src="images/Trek4.jpg" loading="lazy" alt="Gia dinh Tony trek 4" onclick="openImg(3)">
<img src="images/Trek5.jpg" loading="lazy" alt="Gia dinh Tony trek 5" onclick="openImg(4)">
<img src="images/Trek6.jpg" loading="lazy" alt="Gia dinh Tony trek 6" onclick="openImg(5)">
<img src="images/Trek7.jpg" loading="lazy" alt="Gia dinh Tony trek 7" onclick="openImg(6)">
<img src="images/Trek8.jpg" loading="lazy" alt="Gia dinh Tony trek 8" onclick="openImg(7)">

</div>


<div class="facebook">

<iframe

src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/giadinhtonyvo&tabs=timeline&height=600&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"

height="600"

style="border:none;overflow:hidden"

scrolling="no"

frameborder="0"

allowfullscreen="true">

</iframe>

</div>


<div class="social">

<a class="facebook-btn" href="https://facebook.com/giadinhtonyvo">

📘 Facebook

</a>

<a class="youtube-btn" href="#">

▶️ YouTube

</a>

<a class="tiktok-btn" href="#">

🎵 TikTok

</a>

<a class="instagram-btn" href="#">

📷 Instagram

</a>

</div>


<div class="lightbox" id="lightbox" onclick="closeImg()">

<img id="lightbox-img">

</div>


<script>

let images=document.querySelectorAll(".gallery img")
let index=0

function openImg(i){

index=i

document.getElementById("lightbox").style.display="flex"
document.getElementById("lightbox-img").src=images[index].src

}

function closeImg(){

document.getElementById("lightbox").style.display="none"

}

/* KEYBOARD */

document.addEventListener("keydown",function(e){

if(e.key==="ArrowRight"){
next()
}

if(e.key==="ArrowLeft"){
prev()
}

if(e.key==="Escape"){
closeImg()
}

})

function next(){

index++

if(index>=images.length){
index=0
}

document.getElementById("lightbox-img").src=images[index].src

}

function prev(){

index--

if(index<0){
index=images.length-1
}

document.getElementById("lightbox-img").src=images[index].src

}

</script>

</body>
</html>
