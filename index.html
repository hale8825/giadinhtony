<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gia Đình Tony</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
text-align:center;
}

/* HEADER */

header{
background:black;
color:white;
padding:40px 20px;
}

header h1{
margin:0;
font-size:36px;
letter-spacing:1px;
}

header p{
margin-top:10px;
opacity:0.8;
}

/* GALLERY */

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

max-width:1000px;
margin:50px auto;
padding:0 20px;

}

.gallery img{

width:100%;
border-radius:12px;
cursor:pointer;

transition:0.35s;

}

.gallery img:hover{

transform:scale(1.07);

box-shadow:0 12px 30px rgba(0,0,0,0.3);

}

/* LIGHTBOX */

.lightbox{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.85);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.lightbox img{

max-width:90%;
max-height:90%;

border-radius:10px;

}

/* FACEBOOK */

.facebook{

margin:60px 0;

display:flex;
justify-content:center;

padding:0 10px;

}

/* SOCIAL */

.social{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

max-width:380px;

margin:40px auto 80px;

}

.social a{

background:black;
color:white;

padding:18px;

text-decoration:none;

border-radius:12px;

font-size:18px;

transition:0.25s;

display:flex;
align-items:center;
justify-content:center;
gap:10px;

}

.social a:hover{

background:#444;

transform:translateY(-3px);

}

/* MOBILE */

@media(max-width:600px){

header h1{
font-size:28px;
}

.gallery{
gap:14px;
}

}

</style>

</head>

<body>

<header>

<h1>Gia Đình Tony</h1>

<p>Lưu giữ những chuyến đi và khoảnh khắc</p>

</header>


<div class="gallery">

<img src="Trek1.jpg" onclick="openImg(this)">
<img src="Trek2.jpg" onclick="openImg(this)">
<img src="Trek3.jpg" onclick="openImg(this)">
<img src="Trek4.jpg" onclick="openImg(this)">
<img src="Trek5.jpg" onclick="openImg(this)">
<img src="Trek6.jpg" onclick="openImg(this)">
<img src="Trek7.jpg" onclick="openImg(this)">
<img src="Trek8.jpg" onclick="openImg(this)">

</div>


<div class="facebook">

<iframe

src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/giadinhtonyvo&tabs=timeline&width=500&height=600&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"

width="500"
height="600"

style="border:none;overflow:hidden"

scrolling="no"

frameborder="0"

allowfullscreen="true">

</iframe>

</div>


<div class="social">

<a href="https://facebook.com/giadinhTony">📘 Facebook</a>

<a href="#">▶️ YouTube</a>

<a href="#">🎵 TikTok</a>

<a href="#">📷 Instagram</a>

</div>


<div class="lightbox" id="lightbox" onclick="closeImg()">

<img id="lightbox-img">

</div>


<script>

function openImg(img){

document.getElementById("lightbox").style.display="flex";

document.getElementById("lightbox-img").src=img.src;

}

function closeImg(){

document.getElementById("lightbox").style.display="none";

}

</script>


</body>
</html>
