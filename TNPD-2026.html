<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trek Tà Năng Phan Dũng | Gia Đình Tony</title>

<meta name="description" content="Hành trình trekking Tà Năng Phan Dũng cùng Tony">

<link rel="icon" href="images/favicon.png">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#fafafa;
color:#333;
margin:0;
text-align:center;
}

/* HEADER */

.header{
padding:40px 20px 10px;
}

.header h1{
font-size:34px;
}

.back{
display:inline-block;
margin-top:10px;
text-decoration:none;
color:#666;
font-size:14px;
}

/* GALLERY */

.gallery{

column-count:3;
column-gap:18px;
max-width:1100px;
margin:auto;
padding:30px 20px;

}

.photo{

break-inside:avoid;
margin-bottom:18px;

}

.photo img{

width:100%;
border-radius:12px;
cursor:pointer;
transition:0.4s;
box-shadow:0 6px 20px rgba(0,0,0,0.15);

}

.photo img:hover{

transform:scale(1.04);
box-shadow:0 12px 35px rgba(0,0,0,0.25);

}

.caption{

font-size:14px;
color:#666;
margin-top:6px;

}

/* LIGHTBOX */

.lightbox{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;

}

.lightbox img{

max-width:90%;
max-height:90%;
border-radius:10px;

}

/* MOBILE */

@media(max-width:768px){

.gallery{
column-count:1;
}

}

</style>

</head>

<body>

<div class="header">

<h1>Trek Tà Năng Phan Dũng</h1>

<a class="back" href="index.html">← Quay về hành trình</a>

</div>


<div class="gallery">

<div class="photo">
<img src="images/tnpd20261.jpg" onclick="openImg(this)">
<p class="caption">Bắt đầu trekking vào rừng.</p>
</div>

<div class="photo">
<img src="images/tnpd20262.jpg" onclick="openImg(this)">
<p class="caption">Tony trên đường tới thác.</p>
</div>

<div class="photo">
<img src="images/tnpd20263.jpg" onclick="openImg(this)">
<p class="caption">Tà Năng Phan Dũng.</p>
</div>
  
<div class="photo">
<img src="images/tnpd202614.jpg" onclick="openImg(this)">
<p class="caption">Tà Năng Phan Dũng.</p>
</div> 
  
<div class="photo">
<img src="images/tnpd202615.jpg" onclick="openImg(this)">
<p class="caption">Tà Năng Phan Dũng.</p>
</div>
  
<div class="photo">
<img src="images/tnpd202616.jpg" onclick="openImg(this)">
<p class="caption">Tà Năng Phan Dũng.</p>
</div>

</div>


<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightbox-img">
</div>


<script>

function openImg(img){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;

}

function closeImg(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
